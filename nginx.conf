# Configuración nginx para EmRider Suspensions
#
# Instalación en el servidor:
#   cp /var/www/emrider/nginx.conf /etc/nginx/sites-available/emrider
#   ln -sf /etc/nginx/sites-available/emrider /etc/nginx/sites-enabled/emrider
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 46.62.153.160 emrider.es www.emrider.es;

    # Frontend: sirve los estáticos de Vite build
    root /var/www/emrider/frontend/dist;
    index index.html;

    # Proxy: redirige /api/* al backend Express (puerto 3000)
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: todas las rutas van a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
