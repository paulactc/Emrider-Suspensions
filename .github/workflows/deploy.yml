name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en servidor
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.62.153.160 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.62.153.160 << 'ENDSSH'
            set -e
            cd /var/www/emrider

            echo ">>> git pull"
            git pull

            echo ">>> Backend: instalar dependencias"
            cd backend
            npm ci --omit=dev
            cd ..

            echo ">>> Frontend: instalar dependencias y construir"
            cd frontend
            npm ci
            npm run build
            cd ..

            echo ">>> PM2: reiniciar backend"
            pm2 startOrRestart ecosystem.config.js --update-env

            echo ">>> Deploy completado"
          ENDSSH
