name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.62.153.160
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/emrider
            git pull
            pm2 restart all --update-env
